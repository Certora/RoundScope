name: Test RoundAbout

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: gradle/actions/setup-gradle@v6

      - name: Checkout WALA head
        uses: actions/checkout@v6
        with:
          repository: wala/WALA
          path: WALA

      - name: Publish WALA head to local Maven
        working-directory: WALA
        run: ./gradlew --no-daemon installDebug publishToMavenLocal -xtest

      - name: Run RoundAbout tests and package build
        run: mvn verify
