name: Integration Tests

on: pull_request

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      CERTORAKEY: dummy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Python dependencies
        run: pip install json5 packaging pygments pytest certora-cli

      - name: Build RoundAbout jar
        run: mvn package -DskipTests

      - name: Verify certoraRun works
        run: certoraRun --help | head -5

      - name: Verify solc available
        run: which solc || echo "solc not found on PATH (certoraRun bundles its own)"

      - name: Smoke test roundabout.py directly
        run: |
          cd test/data/Staker
          python ../../../roundabout.py . run.conf /tmp/smoke_test.json 2>&1 || true
          echo "--- Exit code: $? ---"
          cat .certora_internal/roundabout.log 2>/dev/null || echo "(no roundabout.log)"
          ls -la /tmp/smoke_test.json 2>/dev/null || echo "(no output json)"

      - name: Run integration tests
        run: pytest tests/integration/ -v -s
