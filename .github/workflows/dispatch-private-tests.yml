name: Dispatch Private Tests

on:
  workflow_run:
    workflows: ["Test RoundAbout"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: private-tests-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SECURE_APP_ID }}
          private-key: ${{ secrets.SECURE_APP_PRIVATE_KEY }}
          owner: Certora
          repositories: roundabout-tests

      - name: Dispatch roundabout-tests workflow
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Certora/roundabout-tests/dispatches \
            -d '{
              "event_type": "wala-solidity-updated",
              "client_payload": {
                "sha": "'"${{ github.event.workflow_run.head_sha }}"'",
                "branch": "'"${{ github.event.workflow_run.head_branch }}"'",
                "source_repo": "'"${{ github.repository }}"'",
                "source_run_id": "'"${{ github.event.workflow_run.id }}"'"
              }
            }'
