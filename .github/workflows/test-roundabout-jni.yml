---
name: Test RoundAbout JNI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: latest

      - uses: gradle/actions/setup-gradle@v4

      - name: Checkout Solidity
        uses: actions/checkout@v4
        with:
          repository: argotorg/solidity
          path: solidity

      - name: Build Solidity
        working-directory: solidity
        run: ./scripts/build.sh

      - name: Checkout WALA fork
        uses: actions/checkout@v4
        with:
          repository: julian-certora/WALA
          ref: fixesToNativeBridge
          path: WALA

      - name: Publish WALA fork to local Maven
        working-directory: WALA
        run: ./gradlew --no-daemon publishToMavenLocal -xtest

      - name: Build RoundAbout .java code
        run: mvn install

      - name: build RoundAbout native code
        working-directory: jni
        run: make
        env:
          WALA: $(HOME)/WALA
          SOLIDITY: $(HOME)/solidity

      - name: Test RoundAbout .java code
        run: mvn -P with-jni-tests verify
